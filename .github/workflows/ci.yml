name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build, vet, fmt, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: gofmt check
        run: |
          unformatted="$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -race

  docker-build:
    name: Docker build verification
    runs-on: ubuntu-latest
    # Independent of build-test (no `needs:`), so it runs in parallel and
    # doesn't slow down the main gate. The Dockerfile has had a `make
    # docker` target since Week 1 but nothing in CI ever actually invoked
    # it, so a broken Dockerfile (bad COPY path, builder/runtime stage
    # mismatch, etc.) would only be caught by someone manually running
    # `docker build` locally - i.e. probably not until it's already
    # broken in main. This job closes that gap.
    #
    # continue-on-error: true - informational, not a merge gate. The
    # build-test job above is what protects language/test correctness and
    # should stay a hard requirement; this job protects the container
    # packaging story, which is important but shouldn't block a PR that
    # has nothing to do with Docker if e.g. a registry/base-image pull
    # hiccups transiently. Flip this to false once it's been stable for a
    # few weeks and the team wants a broken image build to hard-fail CI.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: langstream:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
